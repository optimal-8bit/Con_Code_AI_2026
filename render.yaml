services:
  # Main Backend Service
  - type: web
    name: nextgen-health-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_VISION_MODEL
        value: gemini-2.5-flash
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: nextgen_health
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRE_MINUTES
        value: 120
      - key: JWT_REFRESH_EXPIRE_DAYS
        value: 30
      - key: CORS_ORIGINS
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        value: 15
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false

  # AI Service
  - type: web
    name: nextgen-health-ai-service
    runtime: python
    region: oregon
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_NAME
        value: Healthcare AI Service
      - key: APP_VERSION
        value: 1.0.0
      - key: API_PREFIX
        value: /api
      - key: LLM_MODEL
        value: gemini-pro
      - key: EMBEDDING_MODEL
        value: models/embedding-001
      - key: TEMPERATURE
        value: 0.3
      - key: GOOGLE_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: healthcare_ai
      - key: CORS_ORIGINS
        sync: false
